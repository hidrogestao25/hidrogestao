<form method="post" enctype="multipart/form-data" id="nfForm">
  {% csrf_token %}
  {{ form.as_p }}

  <div class="d-flex justify-content-end">
    <button type="submit" class="btn btn-success">Salvar</button>
  </div>
</form>

<script>
(function() {
  if (typeof jQuery === "undefined" || typeof jQuery.fn.inputmask === "undefined") {
    return;
  }

  jQuery("#nfForm .money").inputmask("currency", {
    groupSeparator: ".",
    radixPoint: ",",
    digits: 2,
    digitsOptional: false,
    autoGroup: true,
    rightAlign: false,
    removeMaskOnSubmit: false,
    placeholder: "0",
  });
})();
</script>
