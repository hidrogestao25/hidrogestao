{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
  <div class="card shadow-sm">
    <div class="card-header card-header-custom text-white">
      <h5>Inserir documento do aditivo</h5>
    </div>
    <div class="card-body">
      <p><strong>Contrato:</strong> {{ contrato.num_contrato }} - {{ contrato.empresa_terceira }}</p>
      <p><strong>Motivo:</strong> {{ aditivo.motivo }}</p>

      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label" for="{{ form.arquivo_aditivo.id_for_label }}">Arquivo do aditivo</label>
          {{ form.arquivo_aditivo }}
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Salvar documento</button>
          <a href="{% url 'gerar_aditivo_contrato_docm' aditivo.id %}" class="btn btn-success">Gerar aditivo</a>
          <a href="{% url 'contrato_fornecedor_detalhe' contrato.id %}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
