{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <h2>Enviar Minuta do Boletim de Medicao - {{ solicitacao.contrato }}</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="mb-3">
            <label for="id_minuta_boletim" class="form-label">Minuta do BM</label>
            {% if documento_bm.minuta_boletim %}
                <p>
                    Ja existe uma minuta:
                    <a href="{{ documento_bm.minuta_boletim.url }}" target="_blank">Ver atual</a>
                </p>
            {% endif %}
            {{ form.minuta_boletim }}
        </div>

        <button type="submit" class="btn btn-primary">Salvar Arquivo</button>
        <a href="javascript:history.back()" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
