{% extends "base.html" %}
{% block content %}
<div class="container mt-4">

    <div class="card shadow-sm">
        <div class="card-header bg-success text-white">
            <h4 class="mb-0">Inserir Minuta da Ordem de Serviço</h4>
            <small>Solicitação #{{ os.id }}</small>
        </div>

        <div class="card-body">

            <p>
                <strong>Status atual:</strong>
                <span class="badge bg-warning text-dark">Pendente Suprimento</span>
            </p>

            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Arquivo da Minuta</label>
                    {{ form.arquivo_os }}
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">
                        Salvar Minuta
                    </button>
                    <button
                        type="submit"
                        formaction="{{ generation_url }}"
                        formnovalidate
                        class="btn btn-primary"
                    >
                        Gerar OS
                    </button>
                    <a href="{% url 'detalhe_ordem_servico' os.id %}" class="btn btn-secondary">
                        Cancelar
                    </a>
                </div>
            </form>

        </div>
    </div>

</div>
{% endblock %}
