<div class="modal fade" id="{{ modal_id }}" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <form method="post" action="{{ form_action }}">
        {% csrf_token %}
        {% if action_value %}
          <input type="hidden" name="acao" value="{{ action_value }}">
        {% endif %}
        <div class="modal-header">
          <h5 class="modal-title">{{ modal_title|default:"Informar justificativa" }}</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body">
          <label for="{{ modal_id }}_justificativa" class="form-label">
            {{ modal_label|default:"Justificativa da reprovação" }}
          </label>
          <textarea
            class="form-control"
            id="{{ modal_id }}_justificativa"
            name="justificativa"
            rows="4"
            required
          ></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-danger">
            {{ modal_confirm_label|default:"Confirmar reprovação" }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
