{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">
    <h2>Excluir Evento</h2>


<div class="alert alert-warning mt-3">
    Tem certeza que deseja excluir o evento <strong>{{ evento.descricao }}</strong>?
</div>

<form method="post">
    {% csrf_token %}
    {% if next_url %}
        <input type="hidden" name="next" value="{{ next_url }}">
    {% endif %}
    <button type="submit" class="btn btn-danger">Sim, excluir</button>
    {% if next_url %}
        <a href="{{ next_url }}" class="btn btn-secondary">Cancelar</a>
    {% else %}
        <a href="{% url 'contrato_fornecedor_detalhe' evento.contrato_terceiro.id %}" class="btn btn-secondary">Cancelar</a>
    {% endif %}
</form>


</div>
{% endblock %}
