{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Cadastrar Evento - Contrato {{ contrato.cod_projeto }}</h4>
        </div>
        <div class="card-body">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}


            <div class="row">
                <div class="col-md-12 mb-3">
                    <label class="form-label"><strong>Descrição</strong></label>
                    {{ form.descricao }}
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label"><strong>Data prevista para a entrega</strong></label>
                    {{ form.data_prevista }}
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label"><strong>Valor previsto</strong></label>
                    {{ form.valor_previsto }}
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label"><strong>Data prevista para o pagamento</strong></label>
                    {{ form.data_prevista_pagamento }}
                </div>
                <div class="col-md-12 mb-3">
                    <label class="form-label"><strong>Observações do Evento</strong></label>
                    {{ form.observacao }}
                </div>
            </div>

            <div class="d-flex justify-content-between">
              <a href="javascript:history.back()" class="btn btn-secondary">
                Cancelar
              </a>
                <button type="submit" class="btn btn-success">
                    Salvar Evento
                </button>
            </div>
        </form>
    </div>
</div>


</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
<script>
$(document).ready(function(){

    // Máscara monetária
    $('.money').mask('000.000.000.000.000,00', {reverse: true});

    $("#id_data_prevista").change(function(){

        let dataPrevista = $(this).val();

        if (!dataPrevista) return;

        let campoPagamento = $("#id_data_prevista_pagamento");

        if (campoPagamento.val()) {
            return;
        }

        $.ajax({
            url: "{% url 'buscar_proxima_data_pagamento' %}",
            data: {
                data_prevista: dataPrevista
            },
            success: function(response){

                if (response.data) {

                    campoPagamento.val(response.data);

                    mostrarMensagemSugestao("Data de pagamento sugerida automaticamente.");

                } else {
                    mostrarMensagemSugestao("Nenhuma data de pagamento encontrada.", true);
                }
            }
        });

    });

    // Função para exibir mensagem na tela
    function mostrarMensagemSugestao(texto, erro=false){

        // Remove mensagem anterior
        $("#mensagem-sugestao").remove();

        let classe = erro ? "alert-warning" : "alert-info";

        let mensagem = `
            <div id="mensagem-sugestao" class="alert ${classe} mt-2" role="alert">
                ${texto}
            </div>
        `;

        $("#id_data_prevista_pagamento").after(mensagem);

        // Remove automaticamente após 4 segundos
        setTimeout(function(){
            $("#mensagem-sugestao").fadeOut(500, function(){
                $(this).remove();
            });
        }, 4000);
    }

});
</script>

{% endblock %}
